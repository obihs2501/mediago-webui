<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGo</title>
    <style>
        :root {
            --cream: #F7F4EF;
            --surface: #FBF9F5;
            --white: #FFFFFF;
            --border: #E7E1D7;
            --ink: #1F2421;
            --muted: #5C635D;
            --terracotta: #C4612F;
            --terracotta-hover: #A94E22;
            --tint: #F2E3D6;
            --shadow: rgba(31, 36, 33, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 300;
            background: var(--cream);
            color: var(--ink);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-family: Georgia, serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        header h1::first-letter {
            color: var(--terracotta);
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .form-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .form-card h2 {
            font-family: Georgia, serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--surface);
            color: var(--ink);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--terracotta);
            box-shadow: 0 0 0 3px rgba(196, 97, 47, 0.1);
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            background: var(--terracotta);
            color: white;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--terracotta-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(196, 97, 47, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .output {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .output.show {
            display: block;
        }

        .output h3 {
            font-family: Georgia, serif;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .output pre {
            background: var(--surface);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .error {
            color: #991B1B;
            background: #FEE2E2;
            border: 1px solid #FCA5A5;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .success {
            color: #065F46;
            background: #D1FAE5;
            border: 1px solid #6EE7B7;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }

        .advanced-options {
            margin: 1.5rem 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            background: var(--surface);
        }

        .advanced-options summary {
            cursor: pointer;
            font-weight: 400;
            color: var(--muted);
            user-select: none;
            list-style: none;
        }

        .advanced-options summary::before {
            content: '▸ ';
            display: inline-block;
            transition: transform 0.2s;
        }

        .advanced-options[open] summary::before {
            transform: rotate(90deg);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MediaGo</h1>
            <p class="subtitle">支持 92 个中文平台的视频下载器</p>
        </header>

        <main>
            <div class="form-card">
                <h2>添加下载</h2>
                <form id="downloadForm">
                    <div class="form-group">
                        <label for="url">视频链接 *</label>
                        <input type="text" id="url" placeholder="https://www.bilibili.com/video/..." required>
                    </div>

                    <details class="advanced-options">
                        <summary>高级选项</summary>
                        <div class="options-grid">
                            <div class="form-group">
                                <label for="format">格式选择</label>
                                <select id="format">
                                    <option value="">自动 (best)</option>
                                    <option value="1080p">1080p</option>
                                    <option value="720p">720p</option>
                                    <option value="480p">480p</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="cookies">Cookies 文件</label>
                                <input type="text" id="cookies" placeholder="cookies.txt">
                            </div>

                            <div class="form-group">
                                <label for="proxy">代理</label>
                                <input type="text" id="proxy" placeholder="socks5://127.0.0.1:1080">
                            </div>
                        </div>
                    </details>

                    <button type="submit" class="btn-primary" id="submitBtn">开始下载</button>
                </form>
            </div>

            <div id="output" class="output">
                <h3>下载结果</h3>
                <div id="result"></div>
            </div>
        </main>
    </div>

    <script src="wails/runtime.js"></script>
    <script>
        const form = document.getElementById('downloadForm');
        const output = document.getElementById('output');
        const result = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = document.getElementById('url').value;
            const format = document.getElementById('format').value;
            const cookies = document.getElementById('cookies').value;
            const proxy = document.getElementById('proxy').value;

            submitBtn.disabled = true;
            submitBtn.textContent = '下载中...';
            output.classList.add('show');
            result.innerHTML = '<div class="loading">正在下载，请稍候...</div>';

            try {
                const response = await window.go.main.App.DownloadVideo(url, format, cookies, proxy);
                result.innerHTML = `<div class="success">下载完成！</div><pre>${escapeHtml(response)}</pre>`;
            } catch (error) {
                result.innerHTML = `<div class="error">下载失败：${escapeHtml(error)}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '开始下载';
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
