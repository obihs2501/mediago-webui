name: Update Dependencies

on:
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Update go.sum
      run: |
        go mod tidy

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add go.sum go.mod
        git diff --cached --quiet || git commit -m "chore: Update go.sum with Fyne dependencies"
        git push
