name: Build Windows Desktop GUI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Download dependencies
      run: |
        go mod download
        go mod tidy

    - name: Build CLI version (with console)
      run: |
        go build -ldflags="-s -w" -o mediago.exe ./cmd/mediago
      env:
        CGO_ENABLED: 1
        GOOS: windows
        GOARCH: amd64

    - name: Build GUI version (no console)
      run: |
        go build -ldflags="-s -w -H windowsgui" -o mediago-gui.exe ./cmd/mediago
      env:
        CGO_ENABLED: 1
        GOOS: windows
        GOARCH: amd64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mediago-windows-amd64
        path: |
          mediago.exe
          mediago-gui.exe

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          mediago-windows-amd64/mediago.exe
          mediago-windows-amd64/mediago-gui.exe
        draft: false
        prerelease: false
        body: |
          # MediaGo Desktop GUI v${{ github.ref_name }}

          ## 🎉 Windows 桌面版发布

          ### 📥 下载

          直接下载 exe 文件：

          1. **mediago.exe** - CLI + GUI 双模式（带控制台）
             - 命令行使用：`mediago.exe [URL]`
             - 双击打开：GUI 窗口 + 控制台（可看调试信息）

          2. **mediago-gui.exe** - 纯 GUI 模式（无控制台）
             - 仅支持双击打开 GUI
             - 无控制台窗口，更干净
             - 不支持命令行使用

          ### ✨ 推荐

          - **日常使用**：下载 `mediago-gui.exe`
          - **调试/批量**：下载 `mediago.exe`

          ### ⚠️ 依赖

          需要安装 **ffmpeg** 才能正常下载视频
          - 下载：https://www.gyan.dev/ffmpeg/builds/
          - 将 `ffmpeg.exe` 放在与程序同目录

          ### 🎯 GUI 功能

          - ✅ 累积下载日志（不清除历史）
          - ✅ 时间戳和状态图标
          - ✅ 自动滚动到最新日志
          - ✅ 支持格式选择、Cookies、代理
          - ✅ 92 个中文视频平台

          ### 📖 文档

          查看 [README](https://github.com/obihs2501/mediago-webui) 了解更多
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
