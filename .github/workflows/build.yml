name: Build Windows Desktop GUI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Tidy modules
      run: go mod tidy

    - name: Vet
      run: go vet -tags desktop,production ./cmd/mediago
      env:
        CGO_ENABLED: 0

    - name: Test
      run: go test -tags desktop,production ./cmd/mediago
      env:
        CGO_ENABLED: 0

    - name: Build CLI version (with console)
      run: go build -tags desktop,production -ldflags="-s -w" -o mediago.exe ./cmd/mediago
      env:
        CGO_ENABLED: 0
        GOOS: windows
        GOARCH: amd64

    - name: Build GUI version (no console)
      run: go build -tags desktop,production -ldflags="-s -w -H windowsgui" -o mediago-gui.exe ./cmd/mediago
      env:
        CGO_ENABLED: 0
        GOOS: windows
        GOARCH: amd64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mediago-windows-amd64
        path: |
          mediago.exe
          mediago-gui.exe

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          mediago-windows-amd64/mediago.exe
          mediago-windows-amd64/mediago-gui.exe
        draft: false
        prerelease: false
        body: |
          # MediaGo Desktop GUI ${{ github.ref_name }}

          ## 🎉 Windows 桌面版发布（Wails + WebView2）

          本版本 GUI 由 Fyne 迁移到 **Wails v2**：原生系统窗口，任意拉伸缩放，
          界面内容自适应并支持滚动，彻底解决旧版窗口无法调小的问题。

          ### 📥 下载

          1. **mediago-gui.exe** - 纯 GUI 模式（推荐日常使用）
             - 双击打开，无控制台窗口
          2. **mediago.exe** - CLI + GUI 双模式
             - 命令行使用：`mediago.exe [URL]`
             - 双击打开：GUI 窗口 + 控制台（可看调试信息）

          ### ⚠️ 依赖

          - **WebView2 运行时**：Windows 10/11 已内置，无需安装
          - **ffmpeg**：下载合并视频需要
            - 下载：https://www.gyan.dev/ffmpeg/builds/
            - 将 `ffmpeg.exe` 放在与程序同目录

          ### 🎯 GUI 功能

          - ✅ 窗口任意缩放，小窗口下界面自动滚动
          - ✅ 原生目录选择器
          - ✅ 实时进度 + 累积下载日志
          - ✅ 支持画质选择、Cookies、代理、整列表下载
          - ✅ 92 个中文视频平台

          ### 📖 文档

          查看 [README](https://github.com/obihs2501/mediago-webui) 了解更多
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
