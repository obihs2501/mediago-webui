name: Build Windows Desktop GUI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Download dependencies
      run: |
        go mod download
        go mod tidy

    - name: Build
      run: |
        go build -ldflags="-s -w" -o mediago.exe ./cmd/mediago
      env:
        CGO_ENABLED: 1
        GOOS: windows
        GOARCH: amd64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mediago-windows-amd64
        path: mediago.exe

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4

    - name: Package Windows artifact
      run: |
        cd mediago-windows-amd64
        zip ../mediago-windows-amd64.zip mediago.exe
        cd ..

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: mediago-windows-amd64.zip
        draft: false
        prerelease: false
        body: |
          # MediaGo Desktop GUI v${{ github.ref_name }}

          ## 🎉 Windows 桌面版发布

          ### 📥 下载

          - **Windows**: `mediago-windows-amd64.zip`

          ### ✨ 使用方法

          **GUI 模式** - 双击 `mediago.exe` 打开桌面窗口

          **CLI 模式** - 命令行使用：
          ```bash
          mediago.exe https://www.bilibili.com/video/xxx
          ```

          ### ⚠️ 依赖

          需要安装 **ffmpeg** 才能正常下载视频
          - 下载：https://www.gyan.dev/ffmpeg/builds/
          - 将 `ffmpeg.exe` 放在与 `mediago.exe` 同目录

          ### 📖 文档

          查看 [README](https://github.com/obihs2501/mediago-webui) 了解更多

          ### 🌐 支持平台

          92 个中文视频/课程平台：
          - Bilibili, Douyin, 抖音
          - iCourse163, Xuetang, Chaoxing
          - 更多平台运行 `mediago.exe --list-extractors` 查看
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
