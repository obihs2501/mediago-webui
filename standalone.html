<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGo WebUI - 单文件版</title>
    <style>
        :root {
            --cream: #F7F4EF;
            --surface: #FBF9F5;
            --white: #FFFFFF;
            --border: #E7E1D7;
            --ink: #1F2421;
            --muted: #5C635D;
            --terracotta: #C4612F;
            --terracotta-hover: #A94E22;
            --tint: #F2E3D6;
            --shadow: rgba(31, 36, 33, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 300;
            background: var(--cream);
            color: var(--ink);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
        }

        header h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        header h1::first-letter {
            color: var(--terracotta);
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .notice {
            background: var(--tint);
            border: 1px solid var(--terracotta);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .notice h3 {
            font-family: 'Georgia', serif;
            color: var(--terracotta);
            margin-bottom: 1rem;
        }

        .notice p {
            margin-bottom: 0.75rem;
        }

        .notice code {
            background: var(--white);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
        }

        .form-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .form-card h2 {
            font-family: 'Georgia', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--surface);
            color: var(--ink);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--terracotta);
            box-shadow: 0 0 0 3px rgba(196, 97, 47, 0.1);
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            background: var(--terracotta);
            color: white;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--terracotta-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(196, 97, 47, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .output {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .output h3 {
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .output pre {
            background: var(--surface);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .error {
            color: #991B1B;
            background: #FEE2E2;
            border: 1px solid #FCA5A5;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .success {
            color: #065F46;
            background: #D1FAE5;
            border: 1px solid #6EE7B7;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--terracotta);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MediaGo WebUI</h1>
            <p class="subtitle">单文件版 - 本地 HTML 调用</p>
        </header>

        <div class="notice">
            <h3>⚠️ 使用说明</h3>
            <p>这是一个<strong>纯前端</strong>的简化版本，通过调用本地 <code>mediago.exe</code> 来下载。</p>
            <p><strong>限制：</strong>无法实时显示进度，只能在下载完成后看到结果。</p>
            <p><strong>推荐：</strong>如果需要完整功能（实时进度、任务管理），请使用 Go 后端版本。</p>
        </div>

        <main>
            <section class="download-form">
                <div class="form-card">
                    <h2>添加下载</h2>
                    <form id="downloadForm">
                        <div class="form-group">
                            <label for="url">视频链接 *</label>
                            <input type="text" id="url" placeholder="https://www.bilibili.com/video/..." required>
                        </div>

                        <div class="form-group">
                            <label for="format">格式选择</label>
                            <select id="format">
                                <option value="">自动 (best)</option>
                                <option value="1080p">1080p</option>
                                <option value="720p">720p</option>
                                <option value="480p">480p</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-primary" id="submitBtn">开始下载</button>
                    </form>
                </div>
            </section>

            <div id="output" style="display: none;" class="output">
                <h3>执行命令</h3>
                <pre id="command"></pre>
                <div id="result"></div>
            </div>
        </main>

        <footer>
            <p>MediaGo WebUI 单文件版 | <a href="https://github.com/Sophomoresty/mediago" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const url = document.getElementById('url').value;
            const format = document.getElementById('format').value;

            let command = 'mediago.exe';
            if (format) {
                command += ` -f ${format}`;
            }
            command += ` -o "downloads/%(title)s.%(ext)s"`;
            command += ` "${url}"`;

            document.getElementById('command').textContent = command;
            document.getElementById('output').style.display = 'block';

            document.getElementById('result').innerHTML = `
                <div class="notice" style="margin-top: 1rem;">
                    <h3>📋 请手动执行</h3>
                    <p><strong>由于浏览器安全限制，无法直接调用本地程序。</strong></p>
                    <p>请复制上方命令，在终端（CMD 或 PowerShell）中执行：</p>
                    <ol style="margin-left: 1.5rem; margin-top: 0.5rem;">
                        <li>打开命令提示符（CMD）或 PowerShell</li>
                        <li>进入 mediago.exe 所在目录</li>
                        <li>粘贴并执行上方命令</li>
                    </ol>
                </div>
            `;
        });
    </script>
</body>
</html>
