<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="wails-options" content="noautoinject">
    <title>MediaGo 视频下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f6f8;
            color: #333;
            line-height: 1.6;
            overflow: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            max-width: 860px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 22px;
            color: #2c3e50;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card.grow {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 220px;
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
            font-size: 13px;
            color: #555;
        }

        .form-row {
            display: flex;
            gap: 8px;
        }

        .form-row input {
            flex: 1;
            min-width: 0;
        }

        input[type="text"], select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: white;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .checkbox-line {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
            user-select: none;
        }

        .checkbox-line input {
            width: 15px;
            height: 15px;
            accent-color: #4CAF50;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #45a049;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-browse {
            flex: none;
            width: auto;
            padding: 8px 14px;
            font-size: 13px;
            background: #607d8b;
        }

        .btn-browse:hover {
            background: #546e7a;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .progress-area {
            background: #f9f9f9;
            border: 1px solid #eee;
            padding: 10px 12px;
            border-radius: 4px;
            min-height: 64px;
            margin-bottom: 10px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #2c3e50;
        }

        .log-area {
            flex: 1;
            min-height: 120px;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 12px;
            border-radius: 4px;
            overflow-y: auto;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 12.5px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-area::-webkit-scrollbar {
            width: 8px;
        }

        .log-area::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .log-area::-webkit-scrollbar-track {
            background: #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MediaGo 视频下载器</h1>
        </div>

        <div class="card">
            <div class="form-group">
                <label>视频链接</label>
                <input type="text" id="urlInput" placeholder="粘贴视频链接...">
            </div>

            <div class="form-group">
                <label>画质选择</label>
                <select id="formatSelect">
                    <option value="best">自动 (best)</option>
                    <option value="1080p">1080p</option>
                    <option value="720p">720p</option>
                    <option value="480p">480p</option>
                </select>
            </div>

            <div class="form-group">
                <label>保存路径</label>
                <div class="form-row">
                    <input type="text" id="downloadDir" placeholder="下载保存路径">
                    <button class="btn btn-browse" id="browseBtn" onclick="browseDir()">浏览...</button>
                </div>
            </div>

            <div class="form-group">
                <label>Cookies 文件（可选）</label>
                <input type="text" id="cookiesInput" placeholder="Netscape 格式 Cookies 文件路径">
            </div>

            <div class="form-group">
                <label>代理（可选）</label>
                <input type="text" id="proxyInput" placeholder="例如 http://127.0.0.1:7890">
            </div>

            <label class="checkbox-line">
                <input type="checkbox" id="playlistCheck">
                下载整个播放列表 / 课程（不勾选时只下载第一集）
            </label>

            <button class="btn" id="downloadBtn" onclick="startDownload()">开始下载</button>
        </div>

        <div class="card grow">
            <div class="section-title">当前进度</div>
            <div class="progress-area" id="progressText">等待下载...</div>

            <div class="section-title">下载日志</div>
            <div class="log-area" id="logArea"></div>
        </div>
    </div>

    <script src="/wails/ipc.js"></script>
    <script src="/wails/runtime.js"></script>
    <script>
        let defaultDownloadDir = '';

        function backend() {
            return window.go && window.go.main && window.go.main.App;
        }

        function appendLog(text) {
            const logArea = document.getElementById('logArea');
            logArea.textContent += text.endsWith('\n') ? text : text + '\n';
            logArea.scrollTop = logArea.scrollHeight;
        }

        function updateProgress(text) {
            document.getElementById('progressText').textContent = text;
        }

        window.addEventListener('load', async () => {
            if (!backend()) {
                updateProgress('未检测到 Wails 运行时，请通过 mediago 程序打开本界面');
                return;
            }
            window.runtime.EventsOn('log', appendLog);
            window.runtime.EventsOn('progress', updateProgress);
            try {
                defaultDownloadDir = await backend().GetDefaultDownloadDir();
                document.getElementById('downloadDir').value = defaultDownloadDir;
            } catch (err) {
                appendLog('[警告] 获取默认下载目录失败: ' + err);
            }
        });

        async function browseDir() {
            if (!backend()) return;
            try {
                const current = document.getElementById('downloadDir').value.trim();
                const dir = await backend().SelectDownloadDir(current);
                if (dir) {
                    document.getElementById('downloadDir').value = dir;
                }
            } catch (err) {
                appendLog('[警告] 选择目录失败: ' + err);
            }
        }

        async function startDownload() {
            if (!backend()) return;

            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                updateProgress('请输入视频链接');
                return;
            }

            const format = document.getElementById('formatSelect').value;
            const dir = document.getElementById('downloadDir').value.trim() || defaultDownloadDir;
            const cookies = document.getElementById('cookiesInput').value.trim();
            const proxy = document.getElementById('proxyInput').value.trim();
            const allPlaylist = document.getElementById('playlistCheck').checked;

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = '下载中...';

            updateProgress('准备下载...');
            appendLog('════════════════════════════════════════');
            appendLog('[链接] ' + url);

            try {
                await backend().StartDownload(url, format, dir, cookies, proxy, allPlaylist);
                updateProgress('下载完成');
            } catch (err) {
                // 详细错误已通过 log 事件输出，这里只更新状态
                updateProgress('下载失败: ' + err);
            } finally {
                btn.disabled = false;
                btn.textContent = '开始下载';
            }
        }
    </script>
</body>
</html>
