<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGo WebUI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MediaGo WebUI</h1>
            <p class="subtitle">下载器 - 支持 92 个中文平台</p>
        </header>

        <main>
            <section class="download-form">
                <div class="form-card">
                    <h2>添加下载</h2>
                    <form id="downloadForm">
                        <div class="form-group">
                            <label for="url">视频链接 *</label>
                            <input type="text" id="url" name="url" placeholder="https://www.bilibili.com/video/..." required>
                        </div>

                        <details class="advanced-options">
                            <summary>高级选项</summary>
                            <div class="options-grid">
                                <div class="form-group">
                                    <label for="format">格式选择</label>
                                    <select id="format" name="format">
                                        <option value="">自动 (best)</option>
                                        <option value="1080p">1080p</option>
                                        <option value="720p">720p</option>
                                        <option value="480p">480p</option>
                                        <option value="worst">最低画质</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="output">输出模板</label>
                                    <input type="text" id="output" name="output" placeholder="downloads/%(title)s.%(ext)s">
                                </div>

                                <div class="form-group">
                                    <label for="cookies">Cookies 文件</label>
                                    <input type="text" id="cookies" name="cookies" placeholder="cookies.txt">
                                </div>

                                <div class="form-group">
                                    <label for="cookiesBrowser">从浏览器读取</label>
                                    <select id="cookiesBrowser" name="cookies_browser">
                                        <option value="">无</option>
                                        <option value="chrome">Chrome</option>
                                        <option value="edge">Edge</option>
                                        <option value="firefox">Firefox</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="proxy">代理</label>
                                    <input type="text" id="proxy" name="proxy" placeholder="socks5://127.0.0.1:1080">
                                </div>

                                <div class="form-group checkbox-group">
                                    <label>
                                        <input type="checkbox" id="yesPlaylist" name="yes_playlist">
                                        下载整个播放列表
                                    </label>
                                </div>
                            </div>
                        </details>

                        <button type="submit" class="btn-primary">开始下载</button>
                    </form>
                </div>
            </section>

            <section class="tasks-section">
                <div class="section-header">
                    <h2>下载任务</h2>
                    <button id="refreshBtn" class="btn-secondary">刷新</button>
                </div>
                <div id="tasksList" class="tasks-list">
                    <p class="empty-state">暂无下载任务</p>
                </div>
            </section>

            <section class="extractors-section">
                <details>
                    <summary><h2>支持的平台</h2></summary>
                    <div id="extractorsList" class="extractors-list">
                        <button id="loadExtractors" class="btn-secondary">加载支持的平台列表</button>
                    </div>
                </details>
            </section>
        </main>

        <footer>
            <p>MediaGo WebUI | <a href="https://github.com/Sophomoresty/mediago" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
